<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signUpForm.css">
    <title>Sign Up Form</title>
</head>
<body>
    <div id="mainContainer">
      <div id="heroPanel">
        <div id="logo">
          <img src="odin-lined.png" alt="odin logo" height="140px" width="110px">
          ODIN
        </div>
        <div id="footer1"> Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank">Halie West</a> on <a href="https://unsplash.com" target="_blank">Unsplash</a></div>  
      </div>
      <div id="formPanel">
        <section class="section-panel">

          <p>This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up 
          <span class="italic">now</span> to get started.</p>
          
          <p>You <span class="italic">know</span> you want to.</p>
        </section>

        <section class="section-panel">
          <p>Let's do this!</p>

          <div id="formWrapper">
            <div id="formColumn1">
              <div class="form-input">
                <label for="firstName">FIRST NAME</label>
                <input type="text" id="firstName">
              </div>
              <div class="form-input">
                <label for="email">EMAIL</label>
                <input type="email" id="email">
              </div>
              <div class="form-input">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" minlength="8" pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$" required>
              </div>
            </div>

            <div id="formColumn2">
              <div class="form-input">
                <label for="lastName">LAST NAME</label>
                <input type="text" id="lastName">
              </div>  
              <div class="form-input">
                <label for="phoneNum">PHONE NUMBER</label>
                <input type="tel" id="phoneNum">
              </div>
              <div class="form-input">
                <label for="passwordConf">CONFIRM PASSWORD</label>
                <input type="password" id="passwordConf" minlength="8" pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$" required>
              </div>
            </div>
          </div>  
        </section>

        <section class="section-panel">
          <button type="submit">Create Account</button>
          <div id="footer2">Already have an account? <a>Log in</a></p>    
        </section>
    </div>
</body>
</html>
